services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: job_service_python_app
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespw@host.docker.internal:5432/backend_python
      - REDIS_HOST=redis://:@host.docker.internal:6379
      - MESSAGING_ENABLED=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
