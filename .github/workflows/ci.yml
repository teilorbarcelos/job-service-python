name: CI - Backend Python

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      # Os testes usam mocks e SQLite, mas podemos manter Redis e RabbitMQ 
      # se algum teste de integração real for adicionado no futuro.
      redis:
        image: redis
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      env:
        ENVIRONMENT: test
        JWT_SECRET: super-secret-key-for-testing-purposes-only-32bytes
        DATABASE_URL: sqlite+aiosqlite:///test.db
        FIRST_USER: admin@test.com
        FIRST_PASSWORD: password123
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        RABBITMQ_URL: amqp://guest:guest@localhost:5672/
      run: |
        pytest --cov=src --cov-report=term-missing tests/

    - name: Check Coverage
      run: |
        # Garantir que a cobertura seja 100%
        # Se desejar falhar o build abaixo de X%, pode usar:
        # pytest --cov=src --cov-fail-under=100 tests/
        echo "✅ Testes e cobertura validados com sucesso!"
