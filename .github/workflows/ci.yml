name: CI - Job Service Python

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-asyncio pytest-cov pytest-mock

      - name: Lint
        run: ruff check src/ tests/

      - name: Typecheck
        run: mypy src/

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ci
          MESSAGING_ENABLED: false
        run: |
          pytest --cov=src --cov-report=xml --cov-fail-under=100 tests/

      - name: Check coverage gate
        run: |
          echo "✅ 100% coverage gate passed"
