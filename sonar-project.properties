sonar.projectKey=job-service-python
sonar.projectName=Job Service Python
sonar.sources=src
sonar.tests=tests
sonar.python.coverage.reportPaths=coverage.xml
sonar.host.url=http://localhost:9000
# sonar.login is set via CI environment variable SONAR_TOKEN

# Ignore hardcoded dev env vars in settings (default fallback URLs/creds)
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=secrets:S6736
sonar.issue.ignore.multicriteria.e1.resourceKey=src/shared/config/settings.py
sonar.issue.ignore.multicriteria.e2.ruleKey=secrets:S6698
sonar.issue.ignore.multicriteria.e2.resourceKey=src/shared/config/settings.py
